name: ${COMPOSE_PROJECT_NAME:-ems}

services:
  backend:
    image: ${BACKEND_IMAGE_NAME:-ems-backend}:${BACKEND_IMAGE_TAG:-local}
    container_name: ${BACKEND_CONTAINER_NAME:-ems-backend}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: ${BACKEND_BUILD_CONFIGURATION:-Release}
    env_file:
      - ./.env
    environment:
      Cors__AllowedOriginsCsv: "${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:3000,http://13.201.224.149:8080}"
    ports:
      - "${BACKEND_PORT:-5007}:8080"
    restart: unless-stopped
    networks:
      - ems-network
    volumes:
      - backend_uploads:/app/wwwroot/uploads
      - backend_generated_letters:/app/GeneratedLetters
      - backend_generated_payslips:/app/GeneratedPayslips

  frontend:
    image: ${FRONTEND_IMAGE_NAME:-ems-frontend}:${FRONTEND_IMAGE_TAG:-local}
    container_name: ${FRONTEND_CONTAINER_NAME:-ems-frontend}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - ems-network

networks:
  ems-network:
    name: ${DOCKER_NETWORK_NAME:-ems-network}
    driver: bridge

volumes:
  backend_uploads:
    name: ${BACKEND_UPLOADS_VOLUME_NAME:-ems-backend-uploads}
  backend_generated_letters:
    name: ${BACKEND_GENERATED_LETTERS_VOLUME_NAME:-ems-backend-generated-letters}
  backend_generated_payslips:
    name: ${BACKEND_GENERATED_PAYSLIPS_VOLUME_NAME:-ems-backend-generated-payslips}
